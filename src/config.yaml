ai:
  uri: https://localhost:3334/v1/chat/completions
aimoa_document_processor:
  type: o19
chrome:
  options:
    headless: false
document_processor:
  local:
    input_directory: ../app/input
  system_type: local
emr:
  base_url: http://127.0.0.1:8080/oscar
  document_folder: pending
  incoming_folder: File
  incoming_folder_queue: '1'
  password: passpwd
  pin: '123'
  system_type: o19
  username: emr
file_processing:
  allowed_extensions:
  - .pdf
  - .jpg
  - .png
  - .tiff
  incoming_retries: 0
  input_directory: ../app/input
  max_retries: 3
  output_directory: ../app/output
  pending_retries: 1
  temp_pdf_name: downloaded_pdf.pdf
huey:
  always_eager: true
  console_level: INFO
  file_level: DEBUG
  name: workflow_queue
  results: true
  schedule:
    minute: '*/5'
  store_none: false
inbox:
  pending: 0
llm:
  character: Assistant
  chat_template: '{{ bos_token }}{% for message in messages %}{% if (message[''role'']
    == ''user'') != (loop.index0 % 2 == 0) %}{{ raise_exception(''Conversation roles
    must alternate user/assistant/user/assistant...'') }}{% endif %}{% if message[''role'']
    == ''user'' %}{{ ''[INST] '' + message[''content''] + '' [/INST]'' }}{% elif message[''role'']
    == ''assistant'' %}{{ message[''content''] + eos_token}}{% else %}{{ raise_exception(''Only
    user and assistant roles are supported!'') }}{% endif %}{% endfor %}'
  model: /models/Mistral-7B-Instruct-v0.3.Q8_0.gguf
  temperature: 0.1
  top_p: 0.1
lock:
  status: false
logging:
  filename: ../workflow.log
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  level: DEBUG
ocr:
  device: cuda:0
  enable_gpu: true
  page_limit: 20
  tesseract_path: /usr/bin/tesseract
provider_list:
  output_file: ../config/provider_list.yaml
  template_file: ../config/template_providerlist.txt
testing:
  full_workflow:
    folder_path: ./testing_data/all_files/
  prompt:
    folder_path: ./testing_data/new/
    log_file: log_test_20.txt
