base_url: "http://localhost:8080/oscar"
user_login:
  username: "oscardoc"
  password: ""
  pin: "1117"
last_processed_pdf: ""
enable_ocr_gpu: true
logging:
  version: 1
  disable_existing_loggers: false
  formatters:
    standard:
      format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  handlers:
    console:
      class: logging.StreamHandler
      level: DEBUG
      formatter: standard
      stream: ext://sys.stdout
    file:
      class: logging.FileHandler
      level: INFO
      formatter: standard
      filename: oscar_automation.log
  root:
    level: INFO
    handlers: [console, file]
